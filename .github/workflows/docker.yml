name: Docker CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Docker
      uses: docker/setup-buildx-action@v3

    - name: Build Backend Image
      run: docker build -t backend-image -f Dockerfile.backend .

    - name: Build Frontend Image
      run: docker build -t frontend-image -f Dockerfile.frontend .

    - name: Verify Images
      run: docker images